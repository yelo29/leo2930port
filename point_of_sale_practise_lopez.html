<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tindahan ni Aling Nena - Sari-Sari Store POS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #2c5f2d, #4a7c59);
      min-height: 100vh;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: #ff6b35;
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    header h1 {
      font-size: 2em;
      margin-bottom: 5px;
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .main-content {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .products-section {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .products-section h2 {
      color: #2c5f2d;
      margin-bottom: 20px;
      font-size: 1.5em;
      border-bottom: 2px solid #ff6b35;
      padding-bottom: 10px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .product-card {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background: #f9f9f9;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
      border-color: #ff6b35;
    }

    .product-card img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    .product-card h3 {
      font-size: 1.1em;
      color: #333;
      margin-bottom: 5px;
    }

    .product-card p {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 5px;
    }

    .price {
      font-weight: bold;
      color: #2c5f2d;
      font-size: 1.2em;
      margin-bottom: 10px;
    }

    .add-btn {
      background: #ff6b35;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .add-btn:hover {
      background: #e55a2b;
    }

    .add-product-btn {
      background: #2c5f2d;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1em;
      margin-bottom: 20px;
      transition: background 0.3s ease;
      width: 100%;
    }

    .add-product-btn:hover {
      background: #1f4d29;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      animation: fadeIn 0.3s ease;
    }

    .modal.show {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideIn 0.3s ease;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #ff6b35;
    }

    .modal-header h2 {
      color: #2c5f2d;
      margin: 0;
      font-size: 1.5em;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #999;
      transition: color 0.3s ease;
    }

    .close-btn:hover {
      color: #333;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #ff6b35;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .image-preview {
      width: 150px;
      height: 150px;
      border: 2px dashed #e0e0e0;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
      background: #f9f9f9;
      overflow: hidden;
    }

    .image-preview img {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
    }

    .image-preview-placeholder {
      color: #999;
      font-size: 14px;
      text-align: center;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #e0e0e0;
    }

    .btn-cancel {
      background: #6c757d;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .btn-cancel:hover {
      background: #5a6268;
    }

    .btn-add-product {
      background: #ff6b35;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .btn-add-product:hover {
      background: #e55a2b;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideIn {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .cart-section {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      height: 600px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .cart-section h2 {
      color: #2c5f2d;
      margin-bottom: 15px;
      font-size: 1.3em;
      border-bottom: 2px solid #ff6b35;
      padding-bottom: 10px;
    }

    #cartList {
      margin-bottom: 15px;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      padding: 10px;
      background: #fafafa;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #e0e0e0;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .empty-cart {
      text-align: center;
      color: #999;
      padding: 20px;
      font-style: italic;
    }

    .total-section {
      background: #f0f8f0;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    .total {
      font-size: 1.3em;
      font-weight: bold;
      color: #2c5f2d;
    }

    .payment-section {
      margin-bottom: 15px;
    }

    .payment-section label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .payment-section input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 1em;
      margin-bottom: 10px;
    }

    .checkout-btn, .export-btn {
      width: 100%;
      background: #2c5f2d;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1em;
      margin-bottom: 10px;
      transition: background 0.3s ease;
    }

    .checkout-btn:hover, .export-btn:hover {
      background: #1f4d29;
    }

    #changeDisplay {
      padding: 10px;
      background: #fff3cd;
      border-radius: 5px;
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
    }

    .inventory-section {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .inventory-section h2 {
      color: #2c5f2d;
      margin-bottom: 15px;
      font-size: 1.3em;
      border-bottom: 2px solid #ff6b35;
      padding-bottom: 10px;
    }

    #inventoryLog {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 15px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 5px;
    }

    .log-entry {
      padding: 5px;
      border-bottom: 1px solid #e0e0e0;
      font-size: 0.9em;
    }

    @media (max-width: 768px) {
      .container {
        padding: 10px;
      }
      
      header {
        padding: 15px;
      }
      
      header h1 {
        font-size: 1.5em;
      }
      
      header p {
        font-size: 0.9em;
      }
      
      .main-content {
        grid-template-columns: 1fr;
        gap: 15px;
      }
      
      .products-section, .cart-section, .inventory-section {
        padding: 15px;
      }
      
      .product-grid {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
      }
      
      .product-card {
        padding: 10px;
      }
      
      .product-card img {
        width: 80px;
        height: 80px;
      }
      
      .product-card h3 {
        font-size: 0.9em;
      }
      
      .product-card p {
        font-size: 0.8em;
      }
      
      .price {
        font-size: 1em;
      }
      
      .add-btn, .add-product-btn {
        padding: 8px 12px;
        font-size: 0.9em;
      }
      
      .cart-section {
        height: 450px;
      }
      
      .cart-section h2, .products-section h2, .inventory-section h2 {
        font-size: 1.1em;
      }
      
      .total {
        font-size: 1.1em;
      }
      
      .checkout-btn, .export-btn {
        padding: 10px;
        font-size: 0.9em;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 5px;
      }
      
      header {
        padding: 10px;
      }
      
      header h1 {
        font-size: 1.3em;
      }
      
      .main-content {
        gap: 10px;
      }
      
      .products-section, .cart-section, .inventory-section {
        padding: 10px;
      }
      
      .product-grid {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 8px;
      }
      
      .product-card {
        padding: 8px;
      }
      
      .product-card img {
        width: 70px;
        height: 70px;
      }
      
      .product-card h3 {
        font-size: 0.8em;
      }
      
      .product-card p {
        font-size: 0.7em;
      }
      
      .price {
        font-size: 0.9em;
      }
      
      .add-btn, .add-product-btn {
        padding: 6px 10px;
        font-size: 0.8em;
      }
      
      .cart-section {
        height: 400px;
      }
      
      .cart-item {
        padding: 8px;
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
      }
      
      .cart-item div {
        width: 100%;
      }
      
      .cart-item button {
        align-self: flex-end;
      }
      
      .payment-section input {
        padding: 8px;
        font-size: 0.9em;
      }
    }

    /* Modal Mobile Responsiveness */
    @media (max-width: 768px) {
      .modal-content {
        width: 95%;
        padding: 20px;
        margin: 10px;
      }
      
      .modal-header h2 {
        font-size: 1.2em;
      }
      
      .form-group input,
      .form-group textarea {
        padding: 10px;
        font-size: 0.9em;
      }
      
      .image-preview {
        width: 120px;
        height: 120px;
      }
      
      .btn-cancel, .btn-add-product {
        padding: 10px 16px;
        font-size: 0.9em;
      }
    }

    @media (max-width: 480px) {
      .modal-content {
        width: 98%;
        padding: 15px;
        margin: 5px;
      }
      
      .modal-header h2 {
        font-size: 1.1em;
      }
      
      .form-group input,
      .form-group textarea {
        padding: 8px;
        font-size: 0.8em;
      }
      
      .image-preview {
        width: 100px;
        height: 100px;
      }
      
      .btn-cancel, .btn-add-product {
        padding: 8px 12px;
        font-size: 0.8em;
      }
      
      .modal-footer {
        flex-direction: column;
      }
      
      .modal-footer button {
        width: 100%;
        margin-bottom: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1> Tindahan ni Garen</h1>
      <p>Sari-Sari Store Point of Sale System</p>
    </header>

    <div class="main-content">
      <section class="products-section" id="products">
        <h2> Mga Produkto</h2>
        <button class="add-product-btn" onclick="openAddProductModal()">+ Magdagdag ng Bagong Produkto</button>
        <div class="product-grid">
          <div class="product-card" data-name="SUNSILK Shampoo Smooth" data-price="153">
            <img src="https://medias.watsons.com.ph/publishing/WTCPH-10063276-front-prodcat.jpg?version=1734022282" alt="SUNSILK Shampoo">
            <h3>SUNSILK Shampoo</h3>
            <p>Smooth & Manageable 180ml</p>
            <p class="price">₱153</p>
            <button class="add-btn" onclick="addToCart('SUNSILK Shampoo Smooth', 153)">Idagdag sa Cart</button>
          </div>
          
          <div class="product-card" data-name="SUNSILK Shampoo Strong" data-price="153">
            <img src="https://medias.watsons.com.ph/publishing/WTCPH-10069490-front-prodcat.jpg?version=1734022197" alt="SUNSILK Shampoo">
            <h3>SUNSILK Shampoo</h3>
            <p>Strong & Long 180ml</p>
            <p class="price">₱153</p>
            <button class="add-btn" onclick="addToCart('SUNSILK Shampoo Strong', 153)">Idagdag sa Cart</button>
          </div>
          
          <div class="product-card" data-name="COLGATE Toothpaste" data-price="49">
            <img src="https://medias.watsons.com.ph/publishing/Colgate_Image1_50046512-1JYlyiw7-zoom.jpg?version=1756707176" alt="COLGATE Toothpaste">
            <h3>COLGATE</h3>
            <p>Optic White Purple 40g</p>
            <p class="price">₱49</p>
            <button class="add-btn" onclick="addToCart('COLGATE Toothpaste', 49)">Idagdag sa Cart</button>
          </div>
        </div>
      </section>

      <aside class="cart-section" id="cart">
        <h2> Cart</h2>
        <div id="cartList"></div>
        
        <div class="total-section">
          <p class="total">Kabuuan: ₱<span id="total">0</span></p>
        </div>

        <div class="payment-section">
          <label for="money">Halaga ng Bayad:</label>
          <input type="number" id="money" placeholder="Ilagay ang halaga ng bayad">
          <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">Mag-checkout</button>
        </div>
        
        <div id="changeDisplay"></div>
      </aside>
    </div>

    <section class="inventory-section" id="inventory">
      <h2> Talaan ng Benta</h2>
      <div id="inventoryLog"></div>
      <button class="export-btn" onclick="exportCSV()">I-Export sa CSV</button>
    </section>
  </div>

  <!-- Add Product Modal -->
  <div id="addProductModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Magdagdag ng Bagong Produkto</h2>
        <button class="close-btn" onclick="closeAddProductModal()">&times;</button>
      </div>
      
      <form id="addProductForm">
        <div class="form-group">
          <label for="productImage">Image URL:</label>
          <input type="url" id="productImage" placeholder="https://example.com/image.jpg" onchange="previewImage()">
          <div class="image-preview" id="imagePreview">
            <div class="image-preview-placeholder">No image selected</div>
          </div>
        </div>
        
        <div class="form-group">
          <label for="productName">Pangalan ng Produkto:</label>
          <input type="text" id="productName" placeholder="Halimbawa: Shampoo" required>
        </div>
        
        <div class="form-group">
          <label for="productDescription">Deskripsyon:</label>
          <textarea id="productDescription" placeholder="Halimbawa: Smooth & Manageable 180ml" required></textarea>
        </div>
        
        <div class="form-group">
          <label for="productPrice">Presyo (₱):</label>
          <input type="number" id="productPrice" placeholder="153" min="1" step="0.01" required>
        </div>
        
        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="closeAddProductModal()">Kanselahin</button>
          <button type="submit" class="btn-add-product">Idagdag ang Produkto</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let cart = [];
    let salesLog = [];
    let products = [
      { name: 'SUNSILK Shampoo Smooth', price: 153, description: 'Smooth & Manageable 180ml', image: 'https://medias.watsons.com.ph/publishing/WTCPH-10063276-front-prodcat.jpg?version=1734022282' },
      { name: 'SUNSILK Shampoo Strong', price: 153, description: 'Strong & Long 180ml', image: 'https://medias.watsons.com.ph/publishing/WTCPH-10069490-front-prodcat.jpg?version=1734022197' },
      { name: 'COLGATE Toothpaste', price: 49, description: 'Optic White Purple 40g', image: 'https://medias.watsons.com.ph/publishing/Colgate_Image1_50046512-1JYlyiw7-zoom.jpg?version=1756707176' }
    ];

    // Modal Functions
    function openAddProductModal() {
      document.getElementById('addProductModal').classList.add('show');
      document.getElementById('addProductForm').reset();
      document.getElementById('imagePreview').innerHTML = '<div class="image-preview-placeholder">No image selected</div>';
    }

    function closeAddProductModal() {
      document.getElementById('addProductModal').classList.remove('show');
    }

    function previewImage() {
      const imageUrl = document.getElementById('productImage').value;
      const preview = document.getElementById('imagePreview');
      
      if (imageUrl) {
        preview.innerHTML = `<img src="${imageUrl}" alt="Product preview" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'image-preview-placeholder\\'>Invalid image URL</div>'">`;
      } else {
        preview.innerHTML = '<div class="image-preview-placeholder">No image selected</div>';
      }
    }

    function addNewProduct(name, price, description, image) {
      const newProduct = { name, price: parseFloat(price), description, image };
      products.push(newProduct);
      
      // Add to product grid
      const productGrid = document.querySelector('.product-grid');
      const productCard = document.createElement('div');
      productCard.className = 'product-card';
      productCard.setAttribute('data-name', name);
      productCard.setAttribute('data-price', price);
      
      productCard.innerHTML = `
        <img src="${image}" alt="${name}" onerror="this.src='https://via.placeholder.com/100x100?text=No+Image'">
        <h3>${name}</h3>
        <p>${description}</p>
        <p class="price">₱${price}</p>
        <button class="add-btn" onclick="addToCart('${name}', ${price})">Idagdag sa Cart</button>
      `;
      
      productGrid.appendChild(productCard);
      
      showNotification(`${name} na nadagdag sa mga produkto!`, 'success');
    }

    // Form submission
    document.getElementById('addProductForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('productName').value;
      const price = document.getElementById('productPrice').value;
      const description = document.getElementById('productDescription').value;
      const image = document.getElementById('productImage').value || 'https://via.placeholder.com/100x100?text=No+Image';
      
      addNewProduct(name, price, description, image);
      closeAddProductModal();
    });

    // Close modal when clicking outside
    window.onclick = function(event) {
      const modal = document.getElementById('addProductModal');
      if (event.target === modal) {
        closeAddProductModal();
      }
    }

    function addToCart(name, price) {
      const existingItem = cart.find(item => item.name === name);
      
      if (existingItem) {
        existingItem.quantity += 1;
      } else {
        cart.push({ name, price, quantity: 1 });
      }
      
      updateCart();
      showNotification(`${name} nadagdag sa cart!`);
    }

    function updateCart() {
      const cartList = document.getElementById('cartList');
      const totalElement = document.getElementById('total');
      
      cartList.innerHTML = '';
      let total = 0;
      
      if (cart.length === 0) {
        cartList.innerHTML = '<div class="empty-cart">Ang cart ay walang laman</div>';
      } else {
        cart.forEach((item, index) => {
          const cartItem = document.createElement('div');
          cartItem.className = 'cart-item';
          cartItem.innerHTML = `
            <div>
              <strong>${item.name}</strong><br>
              <small>₱${item.price} x ${item.quantity}</small>
            </div>
            <div>
              <strong>₱${item.price * item.quantity}</strong><br>
              <button onclick="removeFromCart(${index})" style="background: #dc3545; color: white; border: none; padding: 2px 8px; border-radius: 3px; cursor: pointer; margin-top: 5px;">Tanggalin</button>
            </div>
          `;
          cartList.appendChild(cartItem);
          total += item.price * item.quantity;
        });
      }
      
      totalElement.textContent = total;
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      updateCart();
    }

    function checkout() {
      const moneyInput = document.getElementById('money');
      const money = parseFloat(moneyInput.value);
      const total = parseFloat(document.getElementById('total').textContent);
      
      if (isNaN(money) || money < total) {
        showNotification('Mali ang halaga ng bayad!', 'error');
        return;
      }
      
      const change = money - total;
      const changeDisplay = document.getElementById('changeDisplay');
      changeDisplay.innerHTML = `Sukli: ₱${change.toFixed(2)}`;
      
      // Add to sales log
      const timestamp = new Date().toLocaleString('en-US', { 
        year: 'numeric', 
        month: '2-digit', 
        day: '2-digit', 
        hour: '2-digit', 
        minute: '2-digit' 
      });
      
      cart.forEach(item => {
        salesLog.push({
          timestamp,
          product: item.name,
          price: item.price,
          quantity: item.quantity,
          total: item.price * item.quantity
        });
      });
      
      updateInventoryLog();
      showNotification('Matagumpay na checkout!', 'success');
      
      // Clear cart after successful checkout
      setTimeout(() => {
        cart = [];
        updateCart();
        moneyInput.value = '';
        changeDisplay.innerHTML = '';
      }, 2000);
    }

    function updateInventoryLog() {
      const inventoryLog = document.getElementById('inventoryLog');
      inventoryLog.innerHTML = '';
      
      salesLog.slice(-10).reverse().forEach(sale => {
        const logEntry = document.createElement('div');
        logEntry.className = 'log-entry';
        logEntry.innerHTML = `
          <strong>${sale.timestamp}</strong><br>
          ${sale.product} - ${sale.quantity} pcs x ₱${sale.price} = ₱${sale.total}
        `;
        inventoryLog.appendChild(logEntry);
      });
    }

    function exportCSV() {
      if (salesLog.length === 0) {
        showNotification('Walang maa-i-export!', 'error');
        return;
      }
      
      let csv = 'Timestamp,Product,Price,Quantity,Total\n';
      salesLog.forEach(sale => {
        csv += `"${sale.timestamp}","${sale.product}",${sale.price},${sale.quantity},${sale.total}\n`;
      });
      
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `sales_log_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      
      showNotification('CSV file na na-download!', 'success');
    }

    function showNotification(message, type = 'info') {
      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 20px;
        border-radius: 5px;
        color: white;
        font-weight: bold;
        z-index: 1000;
        animation: slideIn 0.3s ease;
      `;
      
      if (type === 'success') {
        notification.style.background = '#28a745';
      } else if (type === 'error') {
        notification.style.background = '#dc3545';
      } else {
        notification.style.background = '#17a2b8';
      }
      
      notification.textContent = message;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.remove();
      }, 3000);
    }
  </script>
</body>
</html>
